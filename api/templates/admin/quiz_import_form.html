{% extends "admin/base_site.html" %}
{% block content %}
<div>
    <h2>Importing questions for: {{ quiz.name }}</h2>
    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="submit-row">
            <input type="submit" value="Upload and Add Questions" class="default">
        </div>
    </form>
</div>
{% endblock %}
